version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: devops-app
    ports:
      - "8080:80"
    volumes:
      - ../app:/var/www/html
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: root
      DB_NAME: devopsdb

  db:
    image: mysql:8.0
    container_name: devops-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devopsdb
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ../app/db:/docker-entrypoint-initdb.d

volumes:
  db_data:
